<!DOCTYPE html>
<html>
<head>
  <title>Book Appointment</title>
  <style>
    body {
      font-family: Arial;
      background: #f0f8ff;
      text-align: center;
    }
    form {
      background: white;
      padding: 20px;
      margin: 50px auto;
      width: 300px;
      border-radius: 10px;
    }
    input, textarea {
      width: 90%;
      padding: 10px;
      margin: 10px;
    }
    button {
      padding: 10px 20px;
      background: #0077b6;
      color: white;
      border: none;
      border-radius: 5px;
    }
  </style>
</head>
<body>

<h2>Book Appointment</h2>

<form id="appointmentForm">
  <input type="text" id="name" placeholder="Name" required>
  <input type="text" id="phone" placeholder="Phone" required>
  <input type="date" id="date" required>
  <input type="time" id="time" required>
  <textarea id="problem" placeholder="Problem"></textarea>
  <button type="submit">Submit</button>
</form>

<script>
const scriptURL = "https://script.google.com/macros/s/AKfycbz8YMYnEpAyrFKxy5Ui7SBMEW6WDaV8K2_pDZBhLRd8zaOyhPmgpbt87_9Qq8bQOATZ/exec";

document.getElementById("appointmentForm").addEventListener("submit", function(e){
  e.preventDefault();

  const data = {
    name: document.getElementById("name").value,
    phone: document.getElementById("phone").value,
    date: document.getElementById("date").value,
    time: document.getElementById("time").value,
    problem: document.getElementById("problem").value
  };

  fetch(scriptURL, {
    method: "POST",
    mode: "no-cors",   // 🔥 খুব important
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify(data)
  })
  .then(() => {
    alert("Appointment Booked ✅");
    document.getElementById("appointmentForm").reset();
  })
  .catch(() => alert("Error ❌"));
});
</script>
</html>
<script>
// আজকের date
let today = new Date();

// max date = আজ থেকে ৩ দিন
let maxDate = new Date();
maxDate.setDate(today.getDate() + 3);

// format yyyy-mm-dd
function formatDate(date){
  return date.toISOString().split("T")[0];
}

document.getElementById("date").min = formatDate(today);
document.getElementById("date").max = formatDate(maxDate);
</script>
