<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
    }
    table {
      margin: auto;
      border-collapse: collapse;
    }
    td, th {
      border: 1px solid black;
      padding: 10px;
    }
  </style>
</head>
<body>

<h2>Doctor Appointments</h2>

<table id="table"></table>

<script>
const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ94x3Oo74JzWGCNMi6vKRwGwd2t2gdlSDqIWxtNCQVqwD1J6CLJbLGzjKurnPuhmFhW0MAyz-tFnty/pub?output=csv";

fetch(sheetURL)
.then(res => res.text())
.then(data => {
  const rows = data.split("\n");
  let html = "";

  rows.forEach(row => {
    html += "<tr>";
    row.split(",").forEach(cell => {
      html += `<td>${cell}</td>`;
    });
    html += "</tr>";
  });

  document.getElementById("table").innerHTML = html;
});
</script>

</body>
</html>
